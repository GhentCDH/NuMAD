services:
  db:
    container_name: numad-db
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_USER: numad
      POSTGRES_PASSWORD: numad
      POSTGRES_DB: numad
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U numad -d numad"]
      interval: 5s
      timeout: 5s
      retries: 5

  import:
    container_name: numad-import
    build: 
      context: import/
      dockerfile: Dockerfile
    volumes:
      - ./data:/data
      - import-venv:/app/.venv
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: tail -f /dev/null

  kottster:
    container_name: numad-kottster
    build:
      context: kottster
      dockerfile: Dockerfile
    ports:
      - "5480:5480"
      - "5481:5481"
    volumes:
      - ./kottster:/app
      - /app/node_modules
    environment:
      - PORT=5480
      - DEV_API_SERVER_PORT=5481
      - VITE_DOCKER_MODE=true
      - DATABASE_URL=postgresql://numad:numad@db:5432/numad
    tty: true
    stdin_open: true
    command: tail -f /dev/null
    depends_on:
      db:
        condition: service_healthy

  ontop:
    container_name: numad-ontop
    image: ontop/ontop
    env_file:
      - .env
    depends_on:
      db: 
        condition: service_healthy
    volumes:
      - ./ontop/input:/opt/ontop/input
      - ./ontop/jdbc:/opt/ontop/jdbc
    environment:
      ONTOP_ONTOLOGY_FILE: ${ONTOP_ONTOLOGY_FILE}
      ONTOP_MAPPING_FILE: ${ONTOP_MAPPING_FILE}
      ONTOP_PROPERTIES_FILE: ${ONTOP_PROPERTIES_FILE}
      ONTOP_CORS_ALLOWED_ORIGINS: "*"
      ONTOP_LAZY_INIT: "true"
      ONTOP_DEV_MODE: "false"
      DB_URL: ${ONTOP_DB_URL}
      DB_USER: ${ONTOP_DB_USER}
      DB_PASSWORD: ${ONTOP_DB_PASSWORD}
      DB_DRIVER: ${ONTOP_JDBC_DRIVER}
    ports:
      - "8080:8080"
    command: ./ontop endpoint

  # Sampo UI - Client
  client:
    image: ghcr.io/ghentcdh/sampo-ui-client:latest
    container_name: sampo-ui-client-prod
    network_mode: host
    environment:
      API_URL: ${API_URL}

  # Sampo UI - Server
  server:
    image: ghcr.io/ghentcdh/sampo-ui-server:latest
    container_name: sampo-ui-server-prod
    network_mode: host
    environment:
      SPARQL_ENDPOINT: ${SPARQL_ENDPOINT}
    volumes:
      - ./sampoConfigs:/app/configs

volumes:
  import-venv:
  pgdata:
    name: numad_pgdata
