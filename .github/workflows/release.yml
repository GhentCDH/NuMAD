#
# Bouwt en pusht de Kottster-container naar GHCR bij elke push op main.
# Image: ghcr.io/ghentcdh/bantulex:main
#
# Benodigde repository secrets: geen (GITHUB_TOKEN volstaat voor GHCR).
# Benodigde repository/org-instelling: "Read and write permissions" voor
# de Actions workflow (Settings → Actions → General → Workflow permissions).

name: Release – Kottster container

on:
  push:
    branches:
      - main
    paths:
      # Trigger alleen bij wijzigingen die de container raken
      - "kottster/**"
      - ".github/workflows/release.yml"
    tags:
      - 'v*'
  workflow_dispatch:   # handmatige trigger vanuit de GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE:    ghcr.io/ghentcdh/bantulex

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # :main bij elke push op main
            type=raw,value=main,enable={{is_default_branch}}
            # :sha-<kortHash> voor traceerbaarheid
            type=sha,prefix=sha-,format=short
            # :v1.2.3, 1.2, 1 bij een versie-tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # branch/PR tags
            type=ref,event=branch
            type=ref,event=pr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context:   .
          file:      kottster/prd.Dockerfile
          push:      true
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}

      - name: Image digest
        run: echo "Pushed ${{ env.IMAGE }}:main — digest ${{ steps.build-and-push.outputs.digest }}"
